name: Deploy React Files

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Sync Files to Server
        run: |
          rsync -avz --delete \
            --exclude=".git" \
            --exclude="node_modules" \
            -e "ssh -i ~/.ssh/id_ed25519" \
            ./dist/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.SERVER_PATH }}

      - name: Notify Slack
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            STATUS="✅ Deploy react succeeded"
          else
            STATUS="❌ Deploy react failed"
          fi

          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"${STATUS} in `${{ github.repository }}` on branch `${{ github.ref_name }}`\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}